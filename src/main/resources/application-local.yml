spring:
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 55MB

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expire-ms: ${JWT_ACCESS_EXPIRE_MS:3600000}
    refresh-token-expire-ms: ${JWT_REFRESH_EXPIRE_MS:1209600000}

app:
  upload:
    dir: ${UPLOAD_DIR:uploads}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
    max-file-size-bytes: 5242880
    max-images-per-project: 10
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  auth:
    allowed-email-domains: ${ALLOWED_EMAIL_DOMAINS:handong.ac.kr,handong.edu}
    frontend-redirect-url: ${FRONTEND_AUTH_CALLBACK_URL:http://localhost:3000/auth/callback}
  dev:
    auth-bypass: ${DEV_AUTH_BYPASS:true}
    default-user-email: ${DEV_USER_EMAIL:dev@handong.ac.kr}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
