spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 55MB

server:
  forward-headers-strategy: framework

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expire-ms: ${JWT_ACCESS_EXPIRE_MS}
    refresh-token-expire-ms: ${JWT_REFRESH_EXPIRE_MS}

app:
  upload:
    dir: ${UPLOAD_DIR:/var/hislink/uploads}
    public-base-url: ${PUBLIC_BASE_URL}
    max-file-size-bytes: 5242880
    max-images-per-project: 10

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

  auth:
    allowed-email-domains: ${ALLOWED_EMAIL_DOMAINS}
    frontend-redirect-url: ${FRONTEND_AUTH_CALLBACK_URL}

  dev:
    auth-bypass: false

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html