spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expire-ms: ${JWT_ACCESS_EXPIRE_MS:3600000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
